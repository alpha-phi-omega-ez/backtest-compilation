name: Docker Build Test

on:
  pull_request:
    paths:
      - "**.py"
      - "Dockerfile"
      - "uv.lock"
      - ".python-version"
      - "pyproject.toml"

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8

      - name: "Build Docker Image"
        run: |
          docker build .
